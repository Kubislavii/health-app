<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krevní testy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <div class="nav-brand">Krevní testy</div>
        <div class="nav-links">
            <a href="{{ url_for('index') }}" class="{% if request.endpoint == 'index' %}active{% endif %}">Přehled</a>
            <a href="{{ url_for('add') }}" class="{% if request.endpoint in ('add', 'add_to_date') %}active{% endif %}">Přidat</a>
            <a href="{{ url_for('graph') }}" class="{% if request.endpoint == 'graph' %}active{% endif %}">Graf</a>
            <a href="{{ url_for('upload') }}" class="{% if request.endpoint == 'upload' %}active{% endif %}">Nahrát výsledky</a>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
